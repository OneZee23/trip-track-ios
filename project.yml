name: TripTrack
options:
  bundleIdPrefix: com.onezee
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  TripTrack:
    type: application
    platform: iOS
    sources:
      - path: TripTrack
        excludes:
          - "**/*.xcassets/*"
          - Info.plist
      - path: TripTrack/Resources/Assets.xcassets
        type: asset
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onezee.TripTrack
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: TripTrack/Info.plist
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "Для отслеживания поездок в фоновом режиме"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Для отслеживания ваших поездок"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_CFBundleDisplayName: "TripTrack"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: TripTrack/TripTrack.entitlements

  TripTrackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TripTrackTests
    dependencies:
      - target: TripTrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onezee.TripTrackTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  TripTrack:
    build:
      targets:
        TripTrack: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TripTrackTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
