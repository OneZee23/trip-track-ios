name: TripTrack
options:
  bundleIdPrefix: com.onezee
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  TripTrack:
    type: application
    platform: iOS
    sources:
      - path: TripTrack
        excludes:
          - "**/*.xcassets/*"
          - Info.plist
      - path: TripTrack/Resources/Assets.xcassets
        type: asset
      - path: TripTrackShared
    dependencies:
      - target: TripTrackLiveActivityExtension
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onezee.TripTrack
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: TripTrack/Info.plist
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "TripTrack uses your location in the background to continue recording your driving route while the app is minimized, so you don't lose any part of your trip."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "TripTrack uses your location to record your driving route on the map, calculate distance and speed, and save the trip to your travel journal."
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_CFBundleDisplayName: "TripTrack"
        MARKETING_VERSION: "0.1.1"
        CURRENT_PROJECT_VERSION: "2"
    entitlements:
      path: TripTrack/TripTrack.entitlements

  TripTrackLiveActivityExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: TripTrackLiveActivity
        excludes:
          - Info.plist
          - "**/*.xcassets/*"
      - path: TripTrackLiveActivity/Assets.xcassets
        type: asset
      - path: TripTrackShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onezee.TripTrack.LiveActivity
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        INFOPLIST_KEY_CFBundleDisplayName: "TripTrack Live"
        MARKETING_VERSION: "0.1.1"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        APP_INTENTS_DEPLOYMENT_POSTPROCESSING: NO
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    entitlements:
      path: TripTrackLiveActivity/TripTrackLiveActivity.entitlements

  TripTrackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TripTrackTests
    dependencies:
      - target: TripTrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onezee.TripTrackTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  TripTrack:
    build:
      targets:
        TripTrack: all
        TripTrackLiveActivityExtension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TripTrackTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
